name: Build add-on image

on:
  push:
    branches:
      - main
    paths:
      - "home-dialog-console/**"
      - ".github/workflows/build-addon.yaml"
  workflow_dispatch:

permissions:
  contents: read
  packages: write

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push
        uses: docker/build-push-action@v6
        with:
          context: ./home-dialog-console
          push: true
          tags: |
            ghcr.io/alexsudakov/home-dialog-console:latest
            ghcr.io/alexsudakov/home-dialog-console:0.1.0
